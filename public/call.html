<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallDrop - Calling...</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .verified-name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }
    .verified-name-row.hidden { display: none; }
    .verified-display-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e0e0e0;
      margin: 0;
    }
    .blue-tick-icon {
      font-size: 1.3rem;
      color: #4da6ff;
    }
  </style>
</head>
<body>
  <div class="bg-shapes"></div>

  <!-- ========== PRE-CALL SCREEN (shows link info + Call button) ========== -->
  <div id="precall-section" class="page-wrapper auth-wrapper">
    <div class="auth-box call-card" style="padding: 32px 24px;">
      <div class="call-avatar">
        <div class="avatar-circle" id="precall-avatar-circle">
          <span id="precall-avatar-letter"></span>
        </div>
        <div id="precall-verified-row" class="verified-name-row hidden">
          <h2 class="verified-display-name" id="precall-verified-name"></h2>
          <span class="blue-tick-icon" style="display:flex; align-items:center;">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 24px; height: 24px; display: block;">
              <path d="M10.52 1.84c.88-.63 2.08-.63 2.96 0l2.36 1.68c.38.27.87.42 1.35.42h2.89c1.07 0 1.94.87 1.94 1.94v2.89c0 .48.15.97.42 1.35l1.68 2.36c.63.88.63 2.08 0 2.96l-1.68 2.36c-.27.38-.42.87-.42 1.35v2.89c0 1.07-.87 1.94-1.94 1.94h-2.89c-.48 0-.97.15-1.35.42l-2.36 1.68c-.88.63-2.08.63-2.96 0l-2.36-1.68c-.38-.27-.87-.42-1.35-.42H4.97c-1.07 0-1.94-.87-1.94-1.94v-2.89c0-.48-.15-.97-.42-1.35l-1.68-2.36c-.63-.88-.63-2.08 0-2.96l1.68-2.36c.27-.38.42-.87.42-1.35V4.97c0-1.07.87-1.94 1.94-1.94h2.89c.48 0 .97-.15 1.35-.42l2.36-1.68z" fill="#0095F6"/>
              <path d="M10.1 16.5l-3.4-3.4 1.4-1.4 2 2 5.6-5.6 1.4 1.4-7 7z" fill="#fff"/>
            </svg>
          </span>
        </div>
        <h2 id="precall-owner-name">Loading...</h2>
        <p id="precall-link-name" class="call-sub"></p>
      </div>
      <button id="start-call-btn" class="btn btn-primary" style="width:100%; margin-top: 8px;">&#128222; Call</button>
      <button id="start-chat-btn" class="btn btn-secondary hidden" style="width:100%; margin-top: 8px;">&#128488; Chat</button>
    </div>
  </div>

  <!-- ========== CALLING SCREEN (ringing / connected) ========== -->
  <div id="caller-section" class="page-wrapper auth-wrapper hidden">
    <div class="auth-box call-card" style="padding: 32px 24px;">
      <div class="call-status-bar">
        <span id="caller-status-text">Ringing...</span>
        <span id="caller-timer" class="hidden">00:00</span>
      </div>
      <div class="call-avatar">
        <div class="avatar-circle ringing" id="caller-avatar-circle">
          <span id="caller-avatar-letter"></span>
        </div>
        <h2 id="caller-peer-name">Loading...</h2>
        <p id="caller-peer-sub" class="call-sub"></p>
        <p id="caller-countdown" class="call-sub countdown-text"></p>
      </div>
      <div class="call-controls">
        <button id="caller-mute-btn" class="call-ctrl-btn hidden" title="Mute">&#127908;</button>
        <button id="caller-chat-toggle-btn" class="call-ctrl-btn hidden" title="Chat">&#128488;</button>
        <button id="caller-end-btn" class="call-ctrl-btn end-btn" title="End Call">&#128222;</button>
      </div>
    </div>
  </div>

  <!-- ========== CHAT SECTION ========== -->
  <div id="chat-section" class="page-wrapper auth-wrapper hidden" style="padding: 0;">
    <div class="auth-box chat-card" style="max-width: 800px; padding: 0; height: 85vh;">
      <div class="chat-header">
        <button id="chat-back-btn" class="chat-back-btn" title="Back">&#8592;</button>
        <h3 id="chat-header-name">Chat</h3>
        <button id="chat-call-btn" class="btn btn-primary btn-sm">&#128222; Call</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div id="chat-typing-indicator" class="chat-typing hidden">typing...</div>
      <div class="chat-input-bar">
        <button id="chat-attach-btn" class="chat-input-btn" title="Attach file">&#128206;</button>
        <input type="text" id="chat-text-input" placeholder="Type a message..." autocomplete="off" />
        <button id="chat-voice-btn" class="chat-input-btn" title="Voice message">&#127908;</button>
        <button id="chat-send-btn" class="chat-input-btn chat-send" title="Send">&#10148;</button>
      </div>
      <input type="file" id="chat-file-input" hidden accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip,.rar" />
    </div>
  </div>

  <!-- Error state -->
  <div id="caller-error" class="page-wrapper auth-wrapper hidden">
    <div class="auth-box">
      <div class="card-header">
        <h1>Link Not Found</h1>
        <p>This call link is invalid or has been removed.</p>
      </div>
    </div>
  </div>

  <audio id="remote-audio" autoplay playsinline></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/caller.js"></script>
</body>
</html>
