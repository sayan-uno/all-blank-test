<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallDrop - Join as Staff</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Loading state -->
  <div id="loading-section" class="container">
    <div class="card">
      <div class="card-header">
        <h1>Loading...</h1>
        <p>Checking staff link</p>
      </div>
    </div>
  </div>

  <!-- Join form -->
  <div id="join-section" class="container hidden">
    <div class="card">
      <div class="card-header">
        <h1>&#128101; Join as Staff</h1>
        <p>Enter the code to activate your account</p>
      </div>
      <div class="info-row" style="margin-bottom: 16px;">
        <span class="info-label">Your Username</span>
        <span id="preset-username" class="info-value highlight"></span>
      </div>
      <form id="join-form" class="form active">
        <div class="input-group">
          <span class="input-icon">&#128273;</span>
          <input type="password" id="join-code" placeholder="Enter staff code" required />
        </div>
        <button type="submit" class="btn btn-primary">Join</button>
      </form>
      <div id="join-message" class="message hidden"></div>
    </div>
  </div>

  <!-- Error / suspended / already joined states -->
  <div id="error-section" class="container hidden">
    <div class="card">
      <div class="card-header">
        <h1 id="error-title">Error</h1>
        <p id="error-msg">Something went wrong.</p>
      </div>
      <a href="/" class="btn btn-outline" style="display: block; text-align: center; margin-top: 16px; text-decoration: none;">Go to Login</a>
    </div>
  </div>

  <script>
    const linkId = window.location.pathname.split('/join/staff/')[1];

    function showMsg(text, type) {
      const el = document.getElementById('join-message');
      el.textContent = text;
      el.className = `message ${type}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function showError(title, msg) {
      document.getElementById('loading-section').classList.add('hidden');
      document.getElementById('join-section').classList.add('hidden');
      document.getElementById('error-section').classList.remove('hidden');
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent = msg;
    }

    async function init() {
      if (!linkId) return showError('Invalid Link', 'This staff link is invalid.');

      try {
        const res = await fetch(`/api/staff/join/${linkId}`);
        if (!res.ok) return showError('Link Not Found', 'This staff link is invalid or has been removed.');
        const data = await res.json();

        if (data.suspended) {
          return showError('Service Suspended', 'Service has been suspended. Please contact the administrator.');
        }
        if (data.paused) {
          return showError('Link Paused', 'This staff link has been paused by the account owner.');
        }
        if (data.alreadyJoined) {
          return showError('Already Joined', `This staff link is already in use by "${data.username}". Please log in instead.`);
        }

        // Show join form
        document.getElementById('loading-section').classList.add('hidden');
        document.getElementById('join-section').classList.remove('hidden');
        document.getElementById('preset-username').textContent = data.username;
      } catch {
        showError('Error', 'Could not load staff link information.');
      }
    }

    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const secretCode = document.getElementById('join-code').value;
      if (!secretCode) return showMsg('Please enter the staff code', 'error');

      try {
        const res = await fetch(`/api/staff/join/${linkId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ secretCode }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('Account created! Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          showMsg(data.error, 'error');
        }
      } catch {
        showMsg('Something went wrong', 'error');
      }
    });

    init();
  </script>
</body>
</html>
