<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CallDrop - Join as Customer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-shapes"></div>

  <!-- Loading state -->
  <div id="loading-section" class="page-wrapper auth-wrapper">
    <div class="auth-box">
      <div class="card-header">
        <h1>Loading...</h1>
        <p>Checking customer link</p>
      </div>
    </div>
  </div>

  <!-- Join form -->
  <div id="join-section" class="page-wrapper auth-wrapper hidden">
    <div class="auth-box">
      <div class="card-header">
        <h1>&#128100; Join as Customer</h1>
        <p>Enter the code to activate your account</p>
      </div>
      <div class="info-row" style="margin-bottom: 16px;">
        <span class="info-label">Your Username</span>
        <span id="preset-username" class="info-value highlight"></span>
      </div>
      <form id="join-form" class="form active">
        <div class="input-group">
          <span class="input-icon">&#128273;</span>
          <input type="password" id="join-code" placeholder="Enter customer code" required />
        </div>
        <button type="submit" class="btn btn-primary">Join</button>
      </form>
      <div id="join-message" class="message hidden"></div>
    </div>
  </div>

  <!-- Error / suspended / already joined states -->
  <div id="error-section" class="page-wrapper auth-wrapper hidden">
    <div class="auth-box">
      <div class="card-header">
        <h1 id="error-title">Error</h1>
        <p id="error-msg">Something went wrong.</p>
      </div>
      <a href="/" class="btn btn-outline" style="display: block; text-align: center; margin-top: 16px; text-decoration: none;">Go to Login</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <script>
    const linkId = window.location.pathname.split('/join/customer/')[1];

    // Initialize Firebase for FCM
    let fcmMessaging = null;
    try {
      firebase.initializeApp({
        apiKey: "AIzaSyD2Lz_Vf1fG9fG0idALAikOPu4dk9oPwU4",
        authDomain: "calldrop-af263.firebaseapp.com",
        projectId: "calldrop-af263",
        storageBucket: "calldrop-af263.firebasestorage.app",
        messagingSenderId: "25680263206",
        appId: "1:25680263206:web:3c7aa17e70fbcf03d28ee7",
      });
      fcmMessaging = firebase.messaging();
    } catch (e) { console.warn('Firebase init error:', e.message); }

    async function getFcmToken() {
      try {
        if (!fcmMessaging) return null;
        const permission = await Notification.requestPermission();
        if (permission !== 'granted') return null;
        const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        return await fcmMessaging.getToken({
          vapidKey: 'BMJvtN9NJCE70ItfhI51JGd04ToCQF8iucVLwb54JkNhUEOM5XvHxyUokjEbE6Em4urtY4jLlQ5Oybj96MmSSGg',
          serviceWorkerRegistration: swReg,
        });
      } catch (e) { console.warn('FCM error:', e.message); return null; }
    }

    function showMsg(text, type) {
      const el = document.getElementById('join-message');
      el.textContent = text;
      el.className = `message ${type}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function showError(title, msg) {
      document.getElementById('loading-section').classList.add('hidden');
      document.getElementById('join-section').classList.add('hidden');
      document.getElementById('error-section').classList.remove('hidden');
      document.getElementById('error-title').textContent = title;
      document.getElementById('error-msg').textContent = msg;
    }

    async function init() {
      if (!linkId) return showError('Invalid Link', 'This customer link is invalid.');

      try {
        const res = await fetch(`/api/customer/join/${linkId}`);
        if (!res.ok) return showError('Link Not Found', 'This customer link is invalid or has been removed.');
        const data = await res.json();

        if (data.suspended) {
          return showError('Service Suspended', 'Service has been suspended. Please contact the administrator.');
        }
        if (data.paused) {
          return showError('Link Paused', 'This customer link has been paused.');
        }
        if (data.alreadyJoined) {
          return showError('Already Joined', `This customer link is already in use by "${data.username}". Please log in instead.`);
        }

        document.getElementById('loading-section').classList.add('hidden');
        document.getElementById('join-section').classList.remove('hidden');
        document.getElementById('preset-username').textContent = data.username;
      } catch {
        showError('Error', 'Could not load customer link information.');
      }
    }

    document.getElementById('join-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const secretCode = document.getElementById('join-code').value;
      if (!secretCode) return showMsg('Please enter the customer code', 'error');

      // Get FCM token before joining
      const fcmToken = await getFcmToken();

      try {
        const res = await fetch(`/api/customer/join/${linkId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ secretCode, fcmToken }),
        });
        const data = await res.json();
        if (res.ok) {
          showMsg('Account created! Redirecting...', 'success');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } else {
          showMsg(data.error, 'error');
        }
      } catch {
        showMsg('Something went wrong', 'error');
      }
    });

    init();
  </script>
</body>
</html>
