<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/style.css" />

</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Admin Login -->
  <div id="admin-login" class="page-wrapper auth-wrapper">
    <div class="auth-box">
      <div class="card-header">
        <h1>&#128274; Restricted Access</h1>
        <p>Enter admin credentials to continue</p>
      </div>
      <div id="admin-login-msg" class="admin-msg"></div>
      <form id="admin-login-form" class="form active">
        <div class="input-group">
          <span class="input-icon">&#128272;</span>
          <input type="password" id="admin-password-input" placeholder="Admin password" required autocomplete="off" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Enter</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div id="admin-dashboard" class="page-wrapper hidden">
    <!-- Top Nav -->
    <header class="top-nav">
      <div class="nav-brand">
        <h1>Command Center</h1>
      </div>
      <div class="nav-actions">
        <button id="admin-logout-btn" class="btn btn-outline btn-sm" style="color:#e53170; border-color:#e53170;">Force Logout</button>
      </div>
    </header>

    <main class="main-content">
      <div class="content-block">
        <div class="links-header">
          <h2>&#128272; Global Auth Code Management</h2>
        </div>
        <div id="admin-dash-msg" class="admin-msg"></div>

        <!-- Global Search Bar -->
        <div class="search-bar">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="global-search-input" placeholder="Search across all users..." autocomplete="off" />
          <button id="global-search-clear-btn" class="search-clear hidden" title="Clear">&times;</button>
        </div>

        <!-- Global Search Results Container -->
        <div id="global-search-results" class="code-list hidden" style="margin-bottom:32px; padding: 24px; border: 1px solid rgba(127,90,240,0.4); border-radius: 16px; background: rgba(127,90,240,0.05);">
          <h3 class="section-title" style="margin-top:0; color:#b49af0; border:none; padding-bottom:0;">Matched Users</h3>
          <div id="global-search-list"></div>
        </div>

      <div class="generate-row">
        <div class="generate-form">
          <input type="text" id="generate-name-input" placeholder="Verified name (optional)" />
          <label class="delete-auth-toggle">
            <input type="checkbox" id="generate-allow-delete" />
            <span>&#128274; Allow delete</span>
          </label>
          <button id="generate-code-btn" class="btn btn-primary">&#43; Generate Auth Code</button>
        </div>
      </div>

        <div id="code-list" class="code-list">
          <div class="admin-empty">Loading...</div>
        </div>

        <div id="load-more-row" class="load-more-row hidden" style="margin-top: 24px;">
          <button id="load-more-btn" class="btn btn-outline btn-sm">Load More Results</button>
        </div>
      </div>
    </main>
  </div>

  <div id="copy-toast" class="copy-toast">Copied!</div>

  <script>
    const adminUrlSecret = window.location.pathname.split('/').pop();
    let adminToken = null;
    let loadedCodes = [];
    let hasMore = false;

    const loginSection = document.getElementById('admin-login');
    const dashSection = document.getElementById('admin-dashboard');
    const loginForm = document.getElementById('admin-login-form');
    const loginMsg = document.getElementById('admin-login-msg');
    const dashMsg = document.getElementById('admin-dash-msg');
    const codeList = document.getElementById('code-list');
    const loadMoreRow = document.getElementById('load-more-row');
    const copyToast = document.getElementById('copy-toast');

    function showLoginMsg(text, type) {
      loginMsg.textContent = text;
      loginMsg.className = 'admin-msg ' + type;
    }

    function showDashMsg(text, type) {
      dashMsg.textContent = text;
      dashMsg.className = 'admin-msg ' + type;
      setTimeout(() => { dashMsg.className = 'admin-msg'; }, 3000);
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function showCopyToast() {
      copyToast.classList.add('show');
      setTimeout(() => copyToast.classList.remove('show'), 1500);
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('admin-password-input').value;
      if (!pw) return;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urlSecret: adminUrlSecret, password: pw }),
        });
        const data = await res.json();
        if (!res.ok) {
          showLoginMsg(data.error || 'Access denied', 'error');
          return;
        }
        adminToken = data.token;
        loginSection.classList.add('hidden');
        dashSection.classList.remove('hidden');
        loadCodes(true);
      } catch {
        showLoginMsg('Connection error', 'error');
      }
    });

    document.getElementById('admin-logout-btn').addEventListener('click', () => {
      adminToken = null;
      loadedCodes = [];
      dashSection.classList.add('hidden');
      loginSection.classList.remove('hidden');
      document.getElementById('admin-password-input').value = '';
      loginMsg.className = 'admin-msg';
    });

    async function adminFetch(url, opts = {}) {
      const res = await fetch(url, {
        ...opts,
        headers: { 'Authorization': `Bearer ${adminToken}`, ...opts.headers },
      });
      if (res.status === 401 || res.status === 403) {
        adminToken = null;
        dashSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        showLoginMsg('Session expired, please login again', 'error');
        return null;
      }
      return res.json();
    }

    // Load codes (paginated)
    async function loadCodes(reset) {
      try {
        if (reset) loadedCodes = [];
        const skip = loadedCodes.length;
        const data = await adminFetch(`/api/admin/codes?skip=${skip}&limit=10&q=${encodeURIComponent(globalSearchQuery)}`);
        if (!data) return;
        loadedCodes = loadedCodes.concat(data.codes);
        hasMore = data.hasMore;
        renderCodes();
      } catch {
        showDashMsg('Failed to load codes', 'error');
      }
    }

    function renderCodes() {
      if (loadedCodes.length === 0) {
        codeList.innerHTML = '<div class="admin-empty">No auth codes yet. Generate one above.</div>';
        loadMoreRow.classList.add('hidden');
        return;
      }

      codeList.innerHTML = loadedCodes.map(c => {
        let badgeClass, badgeText;
        if (c.status === 'blocked') {
          badgeClass = 'badge-blocked';
          badgeText = 'Blocked';
        } else if (c.status === 'active' && c.username) {
          badgeClass = 'badge-connected';
          badgeText = 'Connected';
        } else {
          badgeClass = 'badge-ready';
          badgeText = 'Ready to connect';
        }

        const userInfo = c.username ? ` &middot; ${esc(c.username)}` : '';
        const dateStr = new Date(c.createdAt).toLocaleDateString();

        let actionBtn = '';
        if (c.status === 'blocked') {
          actionBtn = `<button class="btn-block unblock" onclick="toggleBlock('${c._id}','active')">Unblock</button>`;
        } else if (c.status === 'active') {
          actionBtn = `<button class="btn-block block" onclick="toggleBlock('${c._id}','blocked')">Block</button>`;
        }
        
        actionBtn += ` <button class="btn-details" style="margin-left:5px;" onclick="toggleDetails('${c._id}')">Details</button>`;

        const verifiedHtml = c.verifiedName
          ? `<span class="code-verified"><span class="blue-tick">&#10004;&#65039;</span> ${esc(c.verifiedName)}</span>`
          : '';

        const deleteBadge = c.allowDelete
          ? '<span class="admin-badge badge-delete">&#128274; Delete On</span>'
          : '<span class="admin-badge badge-no-delete">&#128275; Delete Off</span>';

        const nameEditHtml = `
          <div class="name-edit-row">
            <input type="text" id="name-input-${c._id}" value="${esc(c.verifiedName || '')}" placeholder="Set verified name" />
            <button class="btn-name" onclick="saveName('${c._id}')">Save</button>
          </div>
        `;

        const deleteToggleHtml = `
          <label class="delete-auth-toggle" style="margin-top:4px;">
            <input type="checkbox" ${c.allowDelete ? 'checked' : ''} onchange="toggleDeleteAuth('${c._id}', this.checked)" />
            <span>Allow delete</span>
          </label>
        `;

        return `
          <div class="code-item" id="code-${c._id}">
            <div class="code-info">
              <span class="code-value" title="Click to copy" onclick="copyCode(this)">${esc(c.code)}</span>
              <span class="code-meta">${dateStr}${userInfo}</span>
              ${verifiedHtml}
              ${nameEditHtml}
              ${deleteToggleHtml}
            </div>
            <div class="code-actions">
              ${deleteBadge}
              <span class="admin-badge ${badgeClass}">${badgeText}</span>
              ${actionBtn}
            </div>
            <div class="code-details-pane" id="details-${c._id}"></div>
          </div>
        `;
      }).join('');

      if (hasMore) {
        loadMoreRow.classList.remove('hidden');
      } else {
        loadMoreRow.classList.add('hidden');
      }
    }

    // Generate new code
    document.getElementById('generate-code-btn').addEventListener('click', async () => {
      try {
        const verifiedName = document.getElementById('generate-name-input').value.trim();
        const allowDelete = document.getElementById('generate-allow-delete').checked;
        const data = await adminFetch('/api/admin/generate-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ verifiedName: verifiedName || undefined, allowDelete }),
        });
        if (!data) return;
        loadedCodes.unshift(data);
        renderCodes();
        document.getElementById('generate-name-input').value = '';
        document.getElementById('generate-allow-delete').checked = false;
        showDashMsg('Auth code generated', 'success');
      } catch {
        showDashMsg('Failed to generate code', 'error');
      }
    });

    // Load more
    document.getElementById('load-more-btn').addEventListener('click', () => loadCodes(false));

    // Block / Unblock
    async function toggleBlock(codeId, newStatus) {
      try {
        const data = await adminFetch(`/api/admin/codes/${codeId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: newStatus }),
        });
        if (!data) return;
        const idx = loadedCodes.findIndex(c => c._id === codeId);
        if (idx !== -1) {
          loadedCodes[idx].status = newStatus;
          renderCodes();
        }
        showDashMsg(data.message, 'success');
      } catch {
        showDashMsg('Failed to update status', 'error');
      }
    }

    // Save verified name
    async function saveName(codeId) {
      try {
        const input = document.getElementById(`name-input-${codeId}`);
        const verifiedName = input.value.trim();
        const data = await adminFetch(`/api/admin/codes/${codeId}/name`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ verifiedName: verifiedName || null }),
        });
        if (!data) return;
        const idx = loadedCodes.findIndex(c => c._id === codeId);
        if (idx !== -1) {
          loadedCodes[idx].verifiedName = data.verifiedName;
          renderCodes();
        }
        showDashMsg(data.message, 'success');
      } catch {
        showDashMsg('Failed to update name', 'error');
      }
    }

    // Copy code to clipboard
    function copyCode(el) {
      const text = el.textContent;
      navigator.clipboard.writeText(text).then(() => showCopyToast()).catch(() => {});
    }

    // Toggle delete authorization
    async function toggleDeleteAuth(codeId, allowed) {
      try {
        const data = await adminFetch(`/api/admin/codes/${codeId}/delete-auth`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ allowDelete: allowed }),
        });
        if (!data) return;
        const idx = loadedCodes.findIndex(c => c._id === codeId);
        if (idx !== -1) {
          loadedCodes[idx].allowDelete = allowed;
          renderCodes();
        }
        showDashMsg(allowed ? 'Delete permission enabled' : 'Delete permission disabled', 'success');
      } catch {
        showDashMsg('Failed to update delete permission', 'error');
      }
    }

    const detailsState = {};

    // Toggle Details Pane
    async function toggleDetails(codeId) {
      const pane = document.getElementById(`details-${codeId}`);
      if (pane.classList.contains('active')) {
        pane.classList.remove('active');
        return;
      }
      pane.classList.add('active');
      pane.innerHTML = '<div class="admin-empty">Loading details...</div>';
      
      detailsState[codeId] = { skip: 0, data: null };
      await fetchAndRenderDetails(codeId);
    }

    async function fetchAndRenderDetails(codeId) {
      const pane = document.getElementById(`details-${codeId}`);
      if (!detailsState[codeId]) return;
      const skip = detailsState[codeId].skip;
      
      try {
        const data = await adminFetch(`/api/admin/codes/${codeId}/details?skip=${skip}&limit=10`);
        if (!data) {
          pane.classList.remove('active');
          return;
        }
        
        if (skip === 0) {
          detailsState[codeId].data = data;
        } else {
          detailsState[codeId].data.staff = detailsState[codeId].data.staff.concat(data.staff);
          detailsState[codeId].data.hasMore = data.hasMore;
        }
        
        detailsState[codeId].skip = detailsState[codeId].data.staff.length;
        renderDetails(codeId, detailsState[codeId].data);
      } catch {
        pane.innerHTML = '<div class="admin-msg error" style="display:block;">Failed to load details</div>';
      }
    }

    // Render details data
    function renderDetails(codeId, data) {
      const pane = document.getElementById(`details-${codeId}`);
      let html = '';
      
      const renderUserRow = (user, label, indentClass) => {
        return `
          <div class="user-row ${indentClass}">
            <div>
              <span style="color:#e0e0e0; font-weight:600;">${esc(user.username)}</span>
              <span style="color:#94a1b2; font-size:0.75rem; margin-left:6px;">(${label})</span>
            </div>
            <div>
              <button class="btn-temp-login" onclick="generateTempPassword('${user._id}', '${esc(user.username)}')">&#128273; Temp Login</button>
            </div>
          </div>
        `;
      };

      if (!data.owner) {
        html += '<div class="admin-empty" style="padding:10px;">No owner account connected yet.</div>';
      } else {
        html += '<div class="hierarchy-section">';
        html += `<div class="hierarchy-title">Structure Counts</div>`;
        html += `<div style="font-size:0.85rem; color:#94a1b2; margin-bottom:12px;">Total: <strong>${data.counts.owner}</strong> Owner, <strong>${data.counts.staff}</strong> Staff, <strong>${data.counts.customer}</strong> Customers</div>`;

        html += '<div class="hierarchy-title">Owner Account</div>';
        html += renderUserRow(data.owner, 'Owner', '');
        
        if (data.owner.customers && data.owner.customers.length > 0) {
           data.owner.customers.forEach(c => {
             html += renderUserRow(c, 'Customer', 'indent-1');
           });
        }
        
        if (data.staff && data.staff.length > 0) {
          html += '<div class="hierarchy-title" style="margin-top:10px;">Staff & Their Customers</div>';
          data.staff.forEach(s => {
            html += renderUserRow(s, 'Staff', 'indent-1');
            if (s.customers && s.customers.length > 0) {
              s.customers.forEach(c => {
                html += renderUserRow(c, 'Customer', 'indent-2');
              });
            }
          });
        }
        html += '</div>';

        if (data.hasMore) {
          html += `<button class="btn btn-outline btn-sm" style="width:100%; margin-top:5px;" onclick="fetchAndRenderDetails('${codeId}')">Load More Hierarchy</button>`;
        }
      }
      
      pane.innerHTML = html;
    }

    // Global search bindings
    let globalSearchQuery = '';
    let globalSearchTimeout;
    const globalSearchInput = document.getElementById('global-search-input');
    const globalSearchClearBtn = document.getElementById('global-search-clear-btn');
    const globalSearchResults = document.getElementById('global-search-results');
    const globalSearchList = document.getElementById('global-search-list');

    if (globalSearchInput) {
      globalSearchInput.addEventListener('input', (e) => {
        globalSearchQuery = e.target.value.trim();
        if (globalSearchQuery) globalSearchClearBtn.classList.remove('hidden');
        else globalSearchClearBtn.classList.add('hidden');
        
        clearTimeout(globalSearchTimeout);
        globalSearchTimeout = setTimeout(() => {
          executeGlobalSearch();
          loadCodes(true);
        }, 400);
      });
      globalSearchClearBtn.addEventListener('click', () => {
        globalSearchInput.value = '';
        globalSearchQuery = '';
        globalSearchClearBtn.classList.add('hidden');
        globalSearchResults.classList.add('hidden');
        loadCodes(true);
      });
    }

    async function executeGlobalSearch() {
      if (!globalSearchQuery) {
        globalSearchResults.classList.add('hidden');
        return;
      }
      try {
        const data = await adminFetch(`/api/admin/users/search?q=${encodeURIComponent(globalSearchQuery)}`);
        if (!data) return;
        
        if (data.length === 0) {
          globalSearchResults.classList.add('hidden');
          return;
        }

        globalSearchResults.classList.remove('hidden');

        globalSearchList.innerHTML = data.map(u => {
          let roleColor = u.role === 'owner' ? '#7f5af0' : (u.role === 'staff' ? '#2cb67d' : '#94a1b2');
          let displayCode = u.verifiedName ? `${esc(u.codeValue)} (${esc(u.verifiedName)})` : esc(u.codeValue);
          return `
            <div class="user-row" style="border-left: 3px solid ${roleColor}; align-items: center;">
              <div style="flex:1;">
                <div style="margin-bottom:4px;">
                  <span style="color:#e0e0e0; font-weight:600; font-size:0.95rem;">${esc(u.username)}</span>
                  <span style="color:${roleColor}; font-size:0.75rem; margin-left:6px; text-transform:uppercase;">[${esc(u.role)}]</span>
                </div>
                <div style="font-size:0.75rem; color:#94a1b2;">
                  Code: <strong style="color:#fffffe;">${displayCode}</strong> &bull; 
                  Creator: <strong style="color:#fffffe;">${esc(u.creator)}</strong>
                </div>
              </div>
              <div style="margin-left: 10px;">
                <button class="btn-temp-login" onclick="generateTempPassword('${u._id}', '${esc(u.username)}')">&#128273; Temp Login</button>
              </div>
            </div>
          `;
        }).join('');
      } catch {
        globalSearchList.innerHTML = '<div class="admin-msg error" style="display:block;">Search failed.</div>';
      }
    }

    // Call temp password API
    async function generateTempPassword(userId, username) {
      if (!confirm(`Generate a 1-hour temporary password to log in as ${username}?`)) return;
      try {
        const data = await adminFetch(`/api/admin/users/${userId}/temp-password`, { method: 'POST' });
        if (!data) return;
        
        prompt(`Temporary Password for ${username} (Valid for 1 hour. Original password remains active):`, data.tempPassword);
      } catch {
        showDashMsg('Failed to generate temp password', 'error');
      }
    }
  </script>
</body>
</html>
